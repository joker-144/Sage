name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  import-check:
    name: Python 3.12 · import check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Show environment info
        run: |
          python --version
          pip --version

      - name: Install package (editable, with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify sage package importable
        run: |
          python -c "import sage; print('sage', sage.__version__)"

      - name: Verify sage CLI entry point
        run: |
          sage --help
